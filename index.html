<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>💰 SpendWise</h1>
        <button id="theme-toggle" class="btn-secondary">🌓 Toggle Theme</button>
    </header>

    <main class="container">
        <section class="balance-card">
            <h2>Total Balance</h2>
            <p id="total-balance">$0.00</p>
        </section>

        <section class="chart-container">
            <canvas id="expense-chart"></canvas>
        </section>

        <section class="form-section">
            <h3>Add Transaction</h3>
            <form id="expense-form">
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" placeholder="e.g., Grocery" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add Transaction</button>
            </form>

            <form id="custom-category-form" class="mt-4">
                <div class="form-group row">
                    <input type="text" id="new-category" placeholder="New category name" required>
                    <button type="submit" class="btn-secondary">Add Category</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h3>Transaction History</h3>
                <select id="sort-filter">
                    <option value="latest">Latest</option>
                    <option value="amount-high">Amount: High to Low</option>
                    <option value="category">Group by Category</option>
                </select>
            </div>
            <div class="scrollable-list">
                <ul id="transaction-list">
                    </ul>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
